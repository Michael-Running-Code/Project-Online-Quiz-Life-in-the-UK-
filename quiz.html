<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Life in the UK - Simple Quiz</title>
    <style>
        body {
            font-family: Arial;
            max-width: 700px;
            margin: 30px auto;
        }

        .question {
            margin: 30px 0;
        }

        button {
            padding: 12px 30px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 6px;
        }

        .result {
            text-align: center;
            font-size: 1.3em;
            margin: 40px 0;
        }

        label {
            display: block;
            margin: 8px 0;
        }

        .quiz-container {
            width: 700px;
            margin: auto;
            display: flex;
            flex-direction: column;
            min-height: 500px;
            /* 👈 important */
        }

        #questionArea {
            max-height: 300px;
            overflow: auto;
        }

        .button-area {
            display: flex;
            justify-content: space-between;
            padding-top: 20px;
        }

        #progress-blocks {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 8px;
            margin: 15px 0;
            max-width: 700px;
        }

        .block {
            width: 36px;
            height: 36px;
            line-height: 36px;
            text-align: center;
            background: #ccc;
            color: #333;
            border: 2px solid #999;
            /* border added */
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .block.answered {
            background: #4CAF50;
            color: white;
            border-color: #388E3C;
            /* darker green border */
        }

        .block.current {
            background: #ff9800;
            color: white;
            border-color: #f57c00;
            /* darker orange border */
            transform: scale(1.15);
        }
    </style>
</head>

<body>
    <h1>Life in the UK Quiz</h1>
    <div id="timer" style="font-size:20px; font-weight:bold; margin-bottom:20px;">
        Time Remaining: 45:00</div>
    <div id="progress-blocks"></div>
    <div id="quiz"></div>
    <div class="quiz-container">
        <div id="questionArea"></div>

        <div class="button-area">
            <button id="backBtn">Back</button>
            <button id="nextBtn">Next</button>
        </div>
    </div>

    <script src="question.js"></script>
    <script>

        let current = 0;
        let answers = [];
        let timeLeft = 45 * 60;
        let timerInterval;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function shuffleOptions(q) {
            let combined = q.options.map(opt => ({
                text: opt,
                isCorrect: Array.isArray(q.correct) ? q.correct.includes(opt) : q.correct === opt
            }));

            shuffle(combined);  // reuse the shuffle function

            q.options = combined.map(item => item.text);
            if (Array.isArray(q.correct)) {
                q.correct = combined.filter(item => item.isCorrect).map(item => item.text);
            } else {
                q.correct = combined.find(item => item.isCorrect)?.text;
            }
        }

        function start() {
            shuffle(questions);
            questions.forEach(shuffleOptions);
            createProgressBlocks();
            startTimer();
            showQuestion(current);
            document.getElementById("backBtn").style.display = "none";
            document.getElementById("nextBtn").style.display = "inline-block";
        }

        function showQuestion(i) {
            const q = questions[i];
            let html = `<div class="question">
                <h3>Question ${i + 1} of ${questions.length}</h3>
                <p>${q.question}</p>`;

            if (q.type === "multiple") {
                html += '<p><small>(select all that apply)</small></p>';
            }

            q.options.forEach((opt, idx) => {
                const type = q.type === "multiple" ? "checkbox" : "radio";
                html += `<label>
                    <input type="${type}" name="ans" value="${idx}">
                    ${opt}</label>`;
            });

            html += `</div>`;

            document.getElementById("questionArea").innerHTML = html;

            // restore answers
            if (answers[i]) {
                document.querySelectorAll('input[name="ans"]').forEach(input => {
                    if (answers[i].includes(parseInt(input.value))) {
                        input.checked = true;
                    }
                });
            }

            document.getElementById("backBtn").style.display = current === 0 ? "none" : "inline-block";
            document.getElementById("nextBtn").textContent = current === questions.length - 1 ? "Submit" : "Next";
            updateProgressBlocks();
        }

        function checkAndNext() {
            const selected = [...document.querySelectorAll('input[name="ans"]:checked')]
                .map(el => parseInt(el.value));

            answers[current] = selected;

            if (current === questions.length - 1) {
                // Check if all questions answered
                const unanswered = answers.reduce((count, ans, i) => {
                    return count + (ans && ans.length > 0 ? 0 : 1);
                }, 0);

                if (unanswered > 0) {
                    if (confirm(`You haven't answered all question(s). Are you sure to submit?`)) {
                        showResult();
                    }
                } else {
                    if (confirm("Are you sure to submit?")) {
                        showResult();
                    }
                }
                return;
            }

            current++;
            showQuestion(current);
            updateProgressBlocks();
        }

        function goBack() {
            if (current > 0) {
                current--;
                showQuestion(current);
            }
            updateProgressBlocks();
        }

        // showResult, startTimer remain the same (fix typos: percent, PASS/Fail)

        document.getElementById("nextBtn").onclick = checkAndNext;
        document.getElementById("backBtn").onclick = goBack;
        function showResult() {
            let score = 0;
            questions.forEach((q, i) => {
                const selected = answers[i] || [];
                const correctIndices = Array.isArray(q.correct)
                    ? q.correct.map(opt => q.options.indexOf(opt))
                    : [q.options.indexOf(q.correct)];

                const isCorrect = selected.length === correctIndices.length &&
                    selected.every(v => correctIndices.includes(v));
                if (isCorrect) score++;
            });

            const percent = Math.round((score / questions.length) * 100);
            const pass = score >= 18;

            document.getElementById("questionArea").innerHTML = `
    <div class="result">
      <h2>Score: ${score} / ${questions.length} (${percent}%)</h2>
      <p style="color: ${pass ? 'green' : 'red'}; font-weight:bold;">
        ${pass ? "PASS" : "FAIL"}
      </p>
      <button onclick="location.reload()">Restart Quiz</button>
    </div>`;

            document.getElementById("backBtn").style.display = "none";
            document.getElementById("nextBtn").style.display = "none";
            clearInterval(timerInterval);
        }

        function createProgressBlocks() {
            const container = document.getElementById("progress-blocks");
            container.innerHTML = "";
            for (let i = 1; i <= questions.length; i++) {
                const block = document.createElement("div");
                block.className = "block";
                block.textContent = i;
                block.dataset.num = i;
                block.onclick = () => jumpToQuestion(i - 1);
                container.appendChild(block);
            }
        }

        function updateProgressBlocks() {
            document.querySelectorAll(".block").forEach(block => {
                const qNum = parseInt(block.dataset.num) - 1;
                block.classList.remove("current");
                if (qNum === current) {
                    block.classList.add("current");
                }
                if (answers[qNum] && answers[qNum].length > 0) {
                    block.classList.add("answered");
                }
            });
        }

        function jumpToQuestion(index) {
            if (index >= 0 && index < questions.length) {
                current = index;
                showQuestion(current);
            }
            updateProgressBlocks();
        }
        start();

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;

                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;

                document.getElementById("timer").textContent =
                    `Time Remaining: ${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showResult();  // auto submit when time ends
                }
            }, 1000);
        }

    </script>

</body>

</html>
